<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Flow — Glass Store</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:#f2f2f7;display:flex;justify-content:center;align-items:center;min-height:100vh;
}
.app-container{
  width:100%;max-width:430px;margin:0 auto;background:#f2f2f7;
  height:100vh;position:relative;display:flex;flex-direction:column;
  overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.08);
}

/* ── TOP BAR ── */
.glass-top-bar{
  background:rgba(242,242,247,0.85);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-bottom:0.5px solid rgba(0,0,0,0.06);
  border-radius:0 0 26px 26px;
  padding-top:max(env(safe-area-inset-top),14px);
  padding-left:16px;padding-right:16px;padding-bottom:14px;
  box-shadow:0 2px 16px rgba(0,0,0,0.04);
  flex-shrink:0;z-index:10;
}
.top-flex-row{display:flex;align-items:center;justify-content:space-between;gap:10px}

.menu-icon-btn{
  background:rgba(255,255,255,0.72);border:0.5px solid rgba(0,0,0,0.06);
  border-radius:14px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.15s,background 0.15s;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.menu-icon-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.9)}
.menu-icon-btn svg{width:20px;height:20px;stroke-width:1.9;color:#1c1c1e}

/* ── SEGMENTED (draggable) ── */
.segmented-wrapper{
  flex:1;background:rgba(0,0,0,0.06);border-radius:14px;padding:3px;
  position:relative;user-select:none;touch-action:none;
}
.segmented-tabs{display:flex;position:relative;z-index:2}
.segment{
  flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;
  border-radius:11px;background:transparent;color:#6c6c70;cursor:pointer;
  transition:color 0.2s;z-index:3;position:relative;
}
.segment.active{color:#1c1c1e}
.sliding-indicator{
  position:absolute;top:3px;bottom:3px;
  background:rgba(255,255,255,0.95);border-radius:11px;
  box-shadow:0 1px 6px rgba(0,0,0,0.08),0 0 0 0.5px rgba(0,0,0,0.04);
  pointer-events:none;z-index:1;will-change:transform;
  transition:none;
}
.sliding-indicator.snap{transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1)}

.filter-chip-btn{
  background:rgba(255,255,255,0.72);border:0.5px solid rgba(0,0,0,0.06);
  border-radius:14px;padding:9px 14px;font-size:13px;font-weight:600;color:#007aff;
  display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;
  transition:transform 0.15s,background 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.filter-chip-btn:active{transform:scale(0.94);background:rgba(255,255,255,0.9)}

/* ── SCROLL ── */
.scroll-content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 14px 110px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.scroll-content::-webkit-scrollbar{display:none}

/* ── GRID ── */
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.product-card{
  background:#fff;border-radius:22px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.04);
  transition:transform 0.18s;cursor:pointer;
}
.product-card:active{transform:scale(0.97)}
.product-img-wrap{position:relative;width:100%;aspect-ratio:1;background:#f0f0f5;overflow:hidden}
.product-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s}
.product-card:hover .product-img{transform:scale(1.03)}

.wishlist-btn{
  position:absolute;top:10px;right:10px;width:34px;height:34px;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:0.5px solid rgba(255,255,255,0.6);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:transform 0.15s;
}
.wishlist-btn:active{transform:scale(0.86)}
.wishlist-btn.liked{background:rgba(255,59,48,0.12)}
.wishlist-btn i.far{color:#8e8e93;font-size:14px}
.wishlist-btn i.fas{color:#ff3b30;font-size:14px}

.like-badge{
  position:absolute;bottom:8px;left:10px;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;color:white;
  display:flex;align-items:center;gap:4px;
}

.product-info-card{padding:12px 12px 14px}
.product-price{font-size:18px;font-weight:800;color:#1c1c1e;letter-spacing:-0.3px}
.product-name{font-size:13px;font-weight:600;color:#1c1c1e;margin:3px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-category{font-size:11px;color:#8e8e93;font-weight:500;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.3px}
.add-cart-btn{
  width:100%;padding:9px 0;background:#f0f7ff;border:none;border-radius:12px;
  color:#007aff;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:transform 0.15s,background 0.15s;
}
.add-cart-btn:active{transform:scale(0.96);background:#e0effe}
.add-cart-btn.in-cart{background:#f0fff5;color:#34c759}

/* ── BOTTOM GLASS BAR (pill, fully glass like original) ── */
.bottom-glass-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 16px max(env(safe-area-inset-bottom),20px);
  z-index:100;pointer-events:none;
}
.bottom-glass-inner{
  background:rgba(220,220,228,0.72);
  backdrop-filter:blur(36px) saturate(200%);
  -webkit-backdrop-filter:blur(36px) saturate(200%);
  border-radius:48px;
  border:0.5px solid rgba(255,255,255,0.75);
  box-shadow:0 8px 32px rgba(0,0,0,0.08),inset 0 0.5px 0 rgba(255,255,255,0.6);
  padding:8px 18px;
  display:flex;align-items:center;gap:12px;
  pointer-events:auto;
}
.glass-search-icon{color:#8e8e93;font-size:17px;flex-shrink:0}
.glass-search-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:16px;font-weight:400;color:#1c1c1e;padding:10px 0;
  font-family:inherit;
}
.glass-search-input::placeholder{color:#aeaeb2;font-weight:400}
.bar-sep{width:0.5px;height:22px;background:rgba(0,0,0,0.12);flex-shrink:0}
.bar-icon-btn{
  background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;position:relative;
  transition:transform 0.15s;flex-shrink:0;
}
.bar-icon-btn:active{transform:scale(0.88)}
.bar-icon-btn svg{width:24px;height:24px;stroke:#1c1c1e;stroke-width:2;fill:none}
.bar-icon-btn.blue svg{stroke:#007aff}
.bag-badge{
  position:absolute;top:-2px;right:-4px;
  background:#ff3b30;color:white;font-size:9px;font-weight:800;
  min-width:17px;height:17px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid rgba(220,220,228,0.72);
}

/* ── TOAST ── */
.toast-message{
  position:absolute;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,30,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:white;padding:10px 20px;border-radius:30px;
  font-size:13px;font-weight:500;z-index:500;opacity:0;
  transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;
}
.toast-message.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CART SHEET ── */
.cart-sheet-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,0);z-index:300;
  transition:background 0.25s;pointer-events:none;
}
.cart-sheet-backdrop.show{background:rgba(0,0,0,0.35);pointer-events:auto}
.cart-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(248,248,250,0.98);backdrop-filter:blur(48px);-webkit-backdrop-filter:blur(48px);
  border-top-left-radius:28px;border-top-right-radius:28px;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.25,0.9,0.3,1.05);
  max-height:72vh;display:flex;flex-direction:column;
  border-top:0.5px solid rgba(0,0,0,0.06);
}
.cart-sheet-backdrop.show .cart-sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#c6c6c8;border-radius:4px;margin:12px auto 4px}
.cart-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px 14px;border-bottom:0.5px solid rgba(0,0,0,0.06);
}
.cart-header span{font-weight:700;font-size:18px;color:#1c1c1e}
.cart-close-btn{
  width:30px;height:30px;background:#e5e5ea;border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:14px;color:#3c3c43;transition:transform 0.15s;
}
.cart-close-btn:active{transform:scale(0.9)}
.cart-empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 20px;gap:12px;
}
.cart-empty-state i{font-size:48px;color:#c7c7cc}
.cart-empty-state p{font-size:15px;color:#8e8e93;font-weight:500}
.cart-items-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
.cart-items-list::-webkit-scrollbar{display:none}
.cart-item-row{
  display:flex;align-items:center;gap:12px;
  background:#fff;border-radius:18px;padding:10px 12px;
  box-shadow:0 1px 6px rgba(0,0,0,0.04),0 0 0 0.5px rgba(0,0,0,0.04);
}
.cart-item-img{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:600;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:13px;color:#8e8e93;margin-top:2px}
.cart-qty-wrap{display:flex;align-items:center;gap:6px}
.qty-btn{
  width:28px;height:28px;border-radius:50%;background:#f2f2f7;border:none;
  font-size:16px;font-weight:700;cursor:pointer;color:#1c1c1e;
  display:flex;align-items:center;justify-content:center;transition:transform 0.15s;
}
.qty-btn:active{transform:scale(0.88)}
.qty-num{font-size:14px;font-weight:700;color:#1c1c1e;min-width:20px;text-align:center}
.cart-delete-btn{background:transparent;border:none;cursor:pointer;color:#ff3b30;font-size:15px;padding:6px;transition:transform 0.15s}
.cart-delete-btn:active{transform:scale(0.86)}
.cart-footer{
  padding:14px 16px max(env(safe-area-inset-bottom),20px);
  border-top:0.5px solid rgba(0,0,0,0.06);background:rgba(248,248,250,0.98);
}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-label{font-size:15px;color:#8e8e93;font-weight:500}
.cart-total-value{font-size:20px;font-weight:800;color:#1c1c1e;letter-spacing:-0.3px}
.checkout-btn{
  width:100%;background:#1c1c1e;color:white;border:none;border-radius:16px;
  padding:16px;font-weight:700;font-size:16px;cursor:pointer;
  transition:transform 0.15s,opacity 0.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.checkout-btn:active{transform:scale(0.98);opacity:0.9}

/* ── MENU SHEET (new bottom sheet for menu) ── */
.menu-sheet-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,0);z-index:350;
  transition:background 0.25s;pointer-events:none;
}
.menu-sheet-backdrop.show{background:rgba(0,0,0,0.35);pointer-events:auto}
.menu-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(248,248,250,0.98);backdrop-filter:blur(48px);-webkit-backdrop-filter:blur(48px);
  border-top-left-radius:28px;border-top-right-radius:28px;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.25,0.9,0.3,1.05);
  max-height:72vh;display:flex;flex-direction:column;
  border-top:0.5px solid rgba(0,0,0,0.06);
}
.menu-sheet-backdrop.show .menu-sheet{transform:translateY(0)}
.menu-sheet-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px 14px;border-bottom:0.5px solid rgba(0,0,0,0.06);
}
.menu-sheet-header span{font-weight:700;font-size:18px;color:#1c1c1e}
.menu-sheet-close-btn{
  width:30px;height:30px;background:#e5e5ea;border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:14px;color:#3c3c43;transition:transform 0.15s;
}
.menu-sheet-close-btn:active{transform:scale(0.9)}
.menu-sheet-items{
  flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;
  scrollbar-width:none;
}
.menu-sheet-items::-webkit-scrollbar{display:none}
.menu-sheet-item{
  display:flex;align-items:center;gap:14px;
  background:#fff;border-radius:18px;padding:14px 16px;
  box-shadow:0 1px 6px rgba(0,0,0,0.04),0 0 0 0.5px rgba(0,0,0,0.04);
  cursor:pointer;transition:transform 0.15s;
}
.menu-sheet-item:active{transform:scale(0.97)}
.menu-sheet-item .icon-wrap{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.menu-sheet-item i{font-size:18px}
.menu-sheet-item span{font-size:15px;font-weight:500;color:#1c1c1e;flex:1}
.menu-sheet-footer{
  padding:14px 16px max(env(safe-area-inset-bottom),20px);
  border-top:0.5px solid rgba(0,0,0,0.06);
}

/* ── SIDE MENU (keep for profile overlay or remove if not needed) ── */
/* We'll keep the side menu styles but won't use them for the main menu anymore.
   Actually we can remove side menu completely since you want bottom sheet.
   But to be safe I'll just leave styles and remove the HTML elements. */
/* Removing side menu styles since we don't need them anymore */

/* ── PROFILE OVERLAY ── */
.full-profile-overlay{
  position:absolute;top:0;right:0;bottom:0;width:100%;
  background:#f2f2f7;z-index:600;
  transform:translateX(100%);
  transition:transform 0.32s cubic-bezier(0.25,0.9,0.3,1.05);
  display:flex;flex-direction:column;overflow-y:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.full-profile-overlay::-webkit-scrollbar{display:none}
.full-profile-overlay.active{transform:translateX(0)}

/* profile nav bar */
.profile-nav-bar{
  padding-top:max(env(safe-area-inset-top),16px);
  padding-left:12px;padding-right:12px;padding-bottom:12px;
  background:rgba(242,242,247,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,0.05);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
.profile-nav-back{
  display:flex;align-items:center;gap:4px;
  background:transparent;border:none;cursor:pointer;
  padding:6px 8px 6px 2px;border-radius:12px;
  transition:opacity 0.15s;
}
.profile-nav-back:active{opacity:0.5}
.profile-nav-back svg{width:20px;height:20px;stroke:#007aff;stroke-width:2.2;fill:none;flex-shrink:0}
.profile-nav-back span{font-size:17px;font-weight:400;color:#007aff}
.profile-nav-title{font-size:17px;font-weight:600;color:#1c1c1e;position:absolute;left:50%;transform:translateX(-50%)}
.profile-nav-settings{
  background:transparent;border:none;cursor:pointer;
  padding:6px;border-radius:12px;transition:opacity 0.15s;
}
.profile-nav-settings:active{opacity:0.5}
.profile-nav-settings svg{width:22px;height:22px;stroke:#007aff;stroke-width:2;fill:none;display:block}

.profile-avatar-section{
  display:flex;flex-direction:column;align-items:center;padding:36px 20px 24px;
}
.avatar-circle-full{
  width:96px;height:96px;background:#e8f0ff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,122,255,0.15);
}
.avatar-circle-full svg{width:56px;height:56px;stroke:#007aff;stroke-width:1.8;fill:none}
.profile-name-full{font-size:22px;font-weight:700;color:#1c1c1e;margin-top:14px}
.profile-email-full{font-size:14px;color:#8e8e93;margin-top:3px}

.profile-stats-full{
  display:flex;justify-content:space-around;
  background:#fff;margin:0 16px 20px;padding:20px;border-radius:22px;
  box-shadow:0 1px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.04);
}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-number{font-size:22px;font-weight:800;color:#1c1c1e;letter-spacing:-0.3px}
.stat-label{font-size:12px;color:#8e8e93;font-weight:500}

.profile-section-card{
  background:#fff;margin:0 16px 16px;border-radius:22px;overflow:hidden;
  box-shadow:0 1px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.04);
}
.profile-menu-item-full{
  display:flex;align-items:center;gap:14px;padding:16px 18px;
  border-bottom:0.5px solid rgba(0,0,0,0.05);cursor:pointer;transition:background 0.15s;
}
.profile-menu-item-full:last-child{border-bottom:none}
.profile-menu-item-full:active{background:#f5f5f5}
.profile-item-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.profile-item-icon i{font-size:16px}
.profile-menu-item-full .item-text{flex:1;font-size:15px;font-weight:500;color:#1c1c1e}
.profile-menu-item-full .chevron{color:#c7c7cc;font-size:13px}
.profile-bottom-pad{height:max(env(safe-area-inset-bottom),32px)}
</style>
</head>
<body>
<div class="app-container">

  <!-- TOP BAR -->
  <div class="glass-top-bar">
    <div class="top-flex-row">
      <button class="menu-icon-btn" id="menuSideBtn" aria-label="Open menu">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
          <path d="M4 6h16M4 12h10M4 18h13"/>
        </svg>
      </button>

      <!-- DRAGGABLE SEGMENTED -->
      <div class="segmented-wrapper" id="segmentedWrapper">
        <div class="sliding-indicator snap" id="slidingIndicator"></div>
        <div class="segmented-tabs" id="segmentedTabs">
          <div class="segment active" data-filter="sellers">Sellers</div>
          <div class="segment" data-filter="seekers">Seekers</div>
          <div class="segment" data-filter="free">Free</div>
        </div>
      </div>

      <button class="filter-chip-btn" id="filterBtn">
        <i class="fas fa-sliders-h"></i> Filter
      </button>
    </div>
  </div>

  <!-- SCROLL CONTENT -->
  <div class="scroll-content">
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <!-- BOTTOM GLASS BAR (pill) -->
  <div class="bottom-glass-bar">
    <div class="bottom-glass-inner">
      <i class="fas fa-magnifying-glass glass-search-icon"></i>
      <input type="search" class="glass-search-input" id="searchInput" placeholder="Search products…" autocomplete="off">
      <div class="bar-sep"></div>
      <button class="bar-icon-btn blue" id="bagIconBtn" aria-label="Open cart">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="bag-badge" id="cartBadge" style="display:none">0</span>
      </button>
      <button class="bar-icon-btn" id="profileFullBtn" aria-label="Open profile">
        <!-- circle-user-round icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.925 20.056a6 6 0 0 0-11.851.001"/>
          <circle cx="12" cy="11" r="4"/>
          <circle cx="12" cy="12" r="10"/>

<script>
const PRODUCTS=[
  {id:1,name:"Aura Headphones",price:"$129",priceNum:129,category:"Electronics",type:"sellers",likes:284,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop"},
  {id:2,name:"Nova Watch",price:"$249",priceNum:249,category:"Electronics",type:"sellers",likes:512,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop"},
  {id:3,name:"Orbit Speaker",price:"$89",priceNum:89,category:"Electronics",type:"sellers",likes:97,img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&h=400&fit=crop"},
  {id:4,name:"Vista Camera",price:"$499",priceNum:499,category:"Electronics",type:"sellers",likes:341,img:"https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400&h=400&fit=crop"},
  {id:5,name:"Flow Backpack",price:"$79",priceNum:79,category:"Accessories",type:"seekers",likes:173,img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop"},
  {id:6,name:"Lumina Lamp",price:"$45",priceNum:45,category:"Home",type:"seekers",likes:68,img:"https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&h=400&fit=crop"},
  {id:7,name:"Nike Air Max",price:"$159",priceNum:159,category:"Shoes",type:"free",likes:920,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop"},
  {id:8,name:"Leather Jacket",price:"$199",priceNum:199,category:"Clothing",type:"free",likes:445,img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&h=400&fit=crop"}
];

let cart=[],likedSet=new Set(),likeCounts={},searchQuery="",currentSeg="sellers",currentSegIdx=0;
PRODUCTS.forEach(p=>{likeCounts[p.id]=p.likes});

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':n}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toastMsg');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

function updateCartBadge(){
  const total=cart.reduce((s,i)=>s+i.qty,0);
  const b=document.getElementById('cartBadge');
  if(total>0){b.textContent=total>99?'99+':total;b.style.display='flex';}
  else b.style.display='none';
}
function addToCart(id){
  const ex=cart.find(i=>i.productId===id);
  if(ex)ex.qty++;else cart.push({productId:id,qty:1});
  showToast('Added: '+PRODUCTS.find(p=>p.id===id).name);
  updateCartBadge();renderGrid();
}
function changeQty(id,delta){
  const idx=cart.findIndex(i=>i.productId===id);if(idx===-1)return;
  const nq=cart[idx].qty+delta;
  if(nq<=0)cart.splice(idx,1);else cart[idx].qty=nq;
  updateCartBadge();renderGrid();renderCartBody();
}
function removeFromCart(id){
  cart=cart.filter(i=>i.productId!==id);
  updateCartBadge();renderGrid();renderCartBody();showToast('Removed');
}
function toggleLike(id){
  if(likedSet.has(id)){likedSet.delete(id);likeCounts[id]--;}
  else{likedSet.add(id);likeCounts[id]++;}
  renderGrid();
}
function cartTotal(){
  return cart.reduce((s,i)=>s+(PRODUCTS.find(p=>p.id===i.productId)?.priceNum||0)*i.qty,0);
}
function renderCartBody(){
  const body=document.getElementById('cartBody'),footer=document.getElementById('cartFooter');
  body.innerHTML='';
  if(!cart.length){
    footer.style.display='none';
    body.innerHTML='<div class="cart-empty-state"><i class="fas fa-bag-shopping"></i><p>Your bag is empty</p></div>';
    return;
  }
  footer.style.display='block';
  const list=document.createElement('div');list.className='cart-items-list';
  cart.forEach(item=>{
    const p=PRODUCTS.find(x=>x.id===item.productId);if(!p)return;
    const row=document.createElement('div');row.className='cart-item-row';
    row.innerHTML=`<img class="cart-item-img" src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="cart-item-info"><div class="cart-item-name">${p.name}</div><div class="cart-item-price">${p.price} × ${item.qty}</div></div>
      <div class="cart-qty-wrap">
        <button class="qty-btn" data-id="${p.id}" data-d="-1">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" data-id="${p.id}" data-d="1">+</button>
      </div>
      <button class="cart-delete-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i></button>`;
    list.appendChild(row);
  });
  body.appendChild(list);
  document.querySelectorAll('.qty-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();changeQty(parseInt(b.dataset.id),parseInt(b.dataset.d))}));
  document.querySelectorAll('.cart-delete-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();removeFromCart(parseInt(b.dataset.id))}));
  document.getElementById('cartTotalPrice').textContent='$'+cartTotal().toFixed(2);
}
function getFiltered(){
  let f=PRODUCTS.filter(p=>p.type===currentSeg);
  if(searchQuery.trim())f=f.filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase()));
  return f;
}
function renderGrid(){
  const grid=document.getElementById('productsGrid'),filtered=getFiltered();
  if(!filtered.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#8e8e93;font-size:15px">No products found</div>';return;}
  grid.innerHTML='';
  filtered.forEach(p=>{
    const liked=likedSet.has(p.id),inCart=cart.some(i=>i.productId===p.id);
    const card=document.createElement('div');card.className='product-card';
    card.innerHTML=`<div class="product-img-wrap">
        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
        <button class="wishlist-btn${liked?' liked':''}" data-id="${p.id}"><i class="${liked?'fas':'far'} fa-heart"></i></button>
        <span class="like-badge"><i class="fas fa-heart" style="font-size:9px;color:#ff6b6b"></i> ${fmt(likeCounts[p.id])}</span>
      </div>
      <div class="product-info-card">
        <div class="product-price">${p.price}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-category">${p.category}</div>
        <button class="add-cart-btn${inCart?' in-cart':''}" data-id="${p.id}">
          ${inCart?'<i class="fas fa-check"></i> In Cart':'<i class="fas fa-plus"></i> Add to Cart'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
  document.querySelectorAll('.wishlist-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();toggleLike(parseInt(b.dataset.id))}));
  document.querySelectorAll('.add-cart-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();addToCart(parseInt(b.dataset.id))}));
}

/* ══════════════════════════════════════
   DRAGGABLE SEGMENTED CONTROL
══════════════════════════════════════ */
function initSegments(){
  const segs=[...document.querySelectorAll('.segment')];
  const ind=document.getElementById('slidingIndicator');
  const wrapper=document.getElementById('segmentedWrapper');
  const N=segs.length;

  function segW(){return wrapper.clientWidth/N}
  function indicatorW(){return segW()-6}

  function posForIdx(idx){return idx*segW()+3}

  function applyPos(x,animated){
    if(animated){ind.classList.add('snap');}
    else{ind.classList.remove('snap');}
    ind.style.transform=`translateX(${x}px)`;
    ind.style.width=indicatorW()+'px';
  }

  function activateIdx(idx){
    currentSegIdx=idx;
    currentSeg=segs[idx].dataset.filter;
    segs.forEach((s,i)=>s.classList.toggle('active',i===idx));
    renderGrid();
  }

  function snapToNearest(x){
    const idx=Math.max(0,Math.min(N-1,Math.round((x-3)/segW())));
    applyPos(posForIdx(idx),true);
    activateIdx(idx);
  }

  // init
  requestAnimationFrame(()=>{
    ind.style.width=indicatorW()+'px';
    applyPos(posForIdx(0),false);
  });
  window.addEventListener('resize',()=>applyPos(posForIdx(currentSegIdx),false));

  // click on segment
  segs.forEach((s,i)=>s.addEventListener('click',()=>{applyPos(posForIdx(i),true);activateIdx(i);}));

  // drag / touch on wrapper
  let dragging=false,startX=0,startPos=0;

  function onDragStart(clientX){
    dragging=true;
    startX=clientX;
    // current translateX
    const m=new DOMMatrix(getComputedStyle(ind).transform);
    startPos=m.m41||posForIdx(currentSegIdx);
    ind.classList.remove('snap');
  }
  function onDragMove(clientX){
    if(!dragging)return;
    const dx=clientX-startX;
    const minX=posForIdx(0),maxX=posForIdx(N-1);
    const newX=Math.max(minX,Math.min(maxX,startPos+dx));
    applyPos(newX,false);
    // highlight nearest
    const nearIdx=Math.max(0,Math.min(N-1,Math.round((newX-3)/segW())));
    segs.forEach((s,i)=>s.classList.toggle('active',i===nearIdx));
  }
  function onDragEnd(clientX){
    if(!dragging)return;
    dragging=false;
    const dx=clientX-startX;
    const currentX=startPos+dx;
    snapToNearest(currentX);
  }

  // touch
  wrapper.addEventListener('touchstart',e=>{onDragStart(e.touches[0].clientX)},{passive:true});
  wrapper.addEventListener('touchmove',e=>{onDragMove(e.touches[0].clientX)},{passive:true});
  wrapper.addEventListener('touchend',e=>{onDragEnd(e.changedTouches[0].clientX)});

  // mouse (desktop)
  wrapper.addEventListener('mousedown',e=>{onDragStart(e.clientX)});
  window.addEventListener('mousemove',e=>{if(dragging)onDragMove(e.clientX)});
  window.addEventListener('mouseup',e=>{if(dragging)onDragEnd(e.clientX)});
}

/* ── CART ── */
function initCartSheet(){
  const back=document.getElementById('cartSheetBackdrop');
  document.getElementById('bagIconBtn').addEventListener('click',()=>{renderCartBody();back.classList.add('show')});
  document.getElementById('closeCartSheet').addEventListener('click',()=>back.classList.remove('show'));
  back.addEventListener('click',e=>{if(e.target===back)back.classList.remove('show')});
  document.getElementById('checkoutBtn').addEventListener('click',()=>{
    if(!cart.length){showToast('Bag is empty');return;}
    showToast('Order placed! Pay on delivery 🎉');
    cart=[];updateCartBadge();renderGrid();renderCartBody();back.classList.remove('show');
  });
}

/* ── MENU SHEET ── */
function initMenuSheet(){
  const backdrop=document.getElementById('menuSheetBackdrop');
  document.getElementById('menuSideBtn').addEventListener('click',()=>backdrop.classList.add('show'));
  document.getElementById('closeMenuSheet').addEventListener('click',()=>backdrop.classList.remove('show'));
  backdrop.addEventListener('click',e=>{if(e.target===backdrop)backdrop.classList.remove('show')});
  document.querySelectorAll('.menu-sheet-item').forEach(item=>{
    item.addEventListener('click',()=>{
      backdrop.classList.remove('show');
      const actionLabels={
        'add-product':'Add Product',
        'create-niche':'Create Niche',
        'verify-orders':'Verify Orders',
        'view-purchases':'View Purchases',
        'manage-niches':'Manage Niches'

      showToast(actionLabels[item.dataset.action]+' (coming soon)');

}

  document.querySelectorAll('.profile-menu-item-full').forEach(item=>{
    item.addEventListener('click',()=>{
      overlay.classList.remove('active');
      showToast(item.querySelector('.item-text').textContent+' (coming soon)');
    });
  });
}

/* ── SEARCH + FILTER ── */
function initSearch(){document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderGrid()})}
function initTopBtns(){document.getElementById('filterBtn').addEventListener('click',()=>showToast('Filter (coming soon)'))}

/* ── BOOT ── */
renderGrid();
initSegments();
initSearch();
initCartSheet();
initMenuSheet();
initProfile();
initTopBtns();
updateCartBadge();
</script>
