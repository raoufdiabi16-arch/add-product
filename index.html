<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Flow — Glass Store</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:#f2f2f7;display:flex;justify-content:center;align-items:center;min-height:100vh;
}
.app-container{
  width:100%;max-width:430px;margin:0 auto;background:#f2f2f7;
  height:100vh;position:relative;display:flex;flex-direction:column;
  overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.08);
}
.main-page{position:absolute;inset:0;display:flex;flex-direction:column;background:#f2f2f7;z-index:1}

/* ── TOP BAR ── */
.glass-top-bar{
  background:rgba(242,242,247,0.85);
  backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);
  border-bottom:0.5px solid rgba(0,0,0,0.06);border-radius:0 0 26px 26px;
  padding-top:max(env(safe-area-inset-top),14px);
  padding-left:16px;padding-right:16px;padding-bottom:14px;
  box-shadow:0 2px 16px rgba(0,0,0,0.04);flex-shrink:0;z-index:10;
}
.top-flex-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.menu-icon-btn{
  background:rgba(255,255,255,0.72);border:0.5px solid rgba(0,0,0,0.06);
  border-radius:14px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.15s;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.menu-icon-btn:active{transform:scale(0.92)}
.menu-icon-btn svg{width:20px;height:20px;stroke-width:1.9;color:#1c1c1e}

/* segmented */
.segmented-wrapper{
  flex:1;background:rgba(0,0,0,0.06);border-radius:14px;padding:3px;
  position:relative;user-select:none;touch-action:none;
}
.segmented-tabs{display:flex;position:relative;z-index:2}
.segment{
  flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;
  border-radius:11px;background:transparent;color:#6c6c70;cursor:pointer;
  transition:color 0.2s;z-index:3;position:relative;
}
.segment.active{color:#1c1c1e}
.sliding-indicator{
  position:absolute;top:3px;bottom:3px;
  background:rgba(255,255,255,0.95);border-radius:11px;
  box-shadow:0 1px 6px rgba(0,0,0,0.08),0 0 0 0.5px rgba(0,0,0,0.04);
  pointer-events:none;z-index:1;will-change:transform;transition:none;
}
.sliding-indicator.snap{transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1)}

.filter-chip-btn{
  background:rgba(255,255,255,0.72);border:0.5px solid rgba(0,0,0,0.06);
  border-radius:14px;padding:9px 14px;font-size:13px;font-weight:600;color:#007aff;
  display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;
  transition:transform 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.05);position:relative;
}
.filter-chip-btn:active{transform:scale(0.94)}
.filter-chip-btn.active-filter{background:#007aff;color:#fff;border-color:#007aff}
.filter-active-dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;
  background:#ff3b30;border-radius:50%;border:1.5px solid #f2f2f7;display:none;
}
.filter-active-dot.visible{display:block}

/* ── CATEGORY FILTER — full-width slim pill ── */
.cat-filter-backdrop{
  position:absolute;left:0;right:0;top:0;bottom:0;z-index:50;pointer-events:none;
}
.cat-filter-backdrop.open{pointer-events:auto}

/* the slim rectangular panel — full width, thin, rounded */
.cat-filter-panel{
  position:absolute;
  left:12px;right:12px;
  top:0; /* set via JS after top bar height */
  background:rgba(245,245,250,0.82);
  backdrop-filter:blur(52px) saturate(220%) brightness(1.06);
  -webkit-backdrop-filter:blur(52px) saturate(220%) brightness(1.06);
  border:0.5px solid rgba(255,255,255,0.72);
  border-radius:20px;
  box-shadow:0 10px 36px rgba(0,0,0,0.11),inset 0 1px 0 rgba(255,255,255,0.85);
  padding:10px 0 12px;
  opacity:0;
  transform:translateY(-6px) scale(0.98);
  transform-origin:top center;
  transition:opacity 0.2s,transform 0.22s cubic-bezier(0.34,1.4,0.64,1);
  pointer-events:none;
  overflow:hidden;
}
.cat-filter-backdrop.open .cat-filter-panel{
  opacity:1;transform:translateY(0) scale(1);pointer-events:auto;
}

/* header row inside panel */
.cat-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px 8px;
}
.cat-panel-title{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.6px}
.cat-panel-clear{
  background:transparent;border:none;cursor:pointer;
  font-size:12px;font-weight:600;color:#ff3b30;padding:2px 4px;
  display:none;
}
.cat-panel-clear.visible{display:block}

/* scrollable chips row — slim horizontal */
.cat-chips-scroll{
  display:flex;gap:7px;overflow-x:auto;padding:2px 14px 2px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.cat-chips-scroll::-webkit-scrollbar{display:none}

/* each chip: slim pill with icon + label side by side */
.cat-chip{
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;cursor:pointer;
  padding:7px 12px;border-radius:30px;
  border:1.5px solid rgba(0,0,0,0.06);
  background:rgba(255,255,255,0.6);
  transition:all 0.17s;white-space:nowrap;
}
.cat-chip:active{transform:scale(0.93)}
.cat-chip.selected{
  background:rgba(0,122,255,0.12);
  border-color:rgba(0,122,255,0.4);
}
.cat-chip svg{width:16px;height:16px;stroke:#3c3c43;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.cat-chip.selected svg{stroke:#007aff}
.cat-chip-label{font-size:12px;font-weight:600;color:#3c3c43}
.cat-chip.selected .cat-chip-label{color:#007aff}

/* scroll */
.scroll-content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 14px 110px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.scroll-content::-webkit-scrollbar{display:none}

/* grid */
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.product-card{
  background:#fff;border-radius:22px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.04);
  transition:transform 0.18s;cursor:pointer;
}
.product-card:active{transform:scale(0.97)}
.product-img-wrap{position:relative;width:100%;aspect-ratio:1;background:#f0f0f5;overflow:hidden}
.product-img{width:100%;height:100%;object-fit:cover;display:block}
.wishlist-btn{
  position:absolute;top:10px;right:10px;width:34px;height:34px;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:0.5px solid rgba(255,255,255,0.6);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:transform 0.15s;
}
.wishlist-btn:active{transform:scale(0.86)}
.wishlist-btn.liked{background:rgba(255,59,48,0.12)}
.wishlist-btn i.far{color:#8e8e93;font-size:14px}
.wishlist-btn i.fas{color:#ff3b30;font-size:14px}
.like-badge{
  position:absolute;bottom:8px;left:10px;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);
  padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;color:white;
  display:flex;align-items:center;gap:4px;
}
.product-info-card{padding:12px 12px 14px}
.product-price{font-size:15px;font-weight:800;color:#1c1c1e;letter-spacing:-0.3px}
.product-name{font-size:13px;font-weight:600;color:#1c1c1e;margin:3px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-category{font-size:11px;color:#8e8e93;font-weight:500;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.3px}
.add-cart-btn{
  width:100%;padding:9px 0;background:#f0f7ff;border:none;border-radius:12px;
  color:#007aff;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:transform 0.15s,background 0.15s;
}
.add-cart-btn:active{transform:scale(0.96)}
.add-cart-btn.in-cart{background:#f0fff5;color:#34c759}

/* ── BOTTOM GLASS BAR ── */
.bottom-glass-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 14px max(env(safe-area-inset-bottom),18px);
  z-index:100;pointer-events:none;
}
.bottom-glass-inner{
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(50px) saturate(240%) brightness(1.12);
  -webkit-backdrop-filter:blur(50px) saturate(240%) brightness(1.12);
  border-radius:48px;
  border:0.5px solid rgba(255,255,255,0.55);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.06),
    inset 0 1.5px 0 rgba(255,255,255,0.8),
    inset 0 -0.5px 0 rgba(255,255,255,0.25),
    inset 1px 0 0 rgba(255,255,255,0.3),
    inset -1px 0 0 rgba(255,255,255,0.3);
  padding:6px 16px;display:flex;align-items:center;gap:10px;pointer-events:auto;
}
.glass-search-icon{color:#8e8e93;font-size:17px;flex-shrink:0}
.glass-search-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:16px;font-weight:400;color:#1c1c1e;padding:10px 0;font-family:inherit;
}
.glass-search-input::placeholder{color:#aeaeb2}
.bar-sep{width:0.5px;height:22px;background:rgba(0,0,0,0.12);flex-shrink:0}
.bar-icon-btn{
  background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;position:relative;
  transition:transform 0.15s;flex-shrink:0;
}
.bar-icon-btn:active{transform:scale(0.88)}
.bar-icon-btn svg{width:24px;height:24px;stroke:#1c1c1e;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.bar-icon-btn.blue svg{stroke:#007aff}
.bag-badge{
  position:absolute;top:-2px;right:-4px;
  background:#ff3b30;color:white;font-size:9px;font-weight:800;
  min-width:17px;height:17px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid rgba(255,255,255,0.3);
}

/* ── TOAST ── */
.toast-message{
  position:absolute;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,30,0.9);backdrop-filter:blur(20px);
  color:white;padding:10px 20px;border-radius:30px;
  font-size:13px;font-weight:500;z-index:999;opacity:0;
  transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;
}
.toast-message.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SIDE MENU bottom sheet ── */
.side-menu-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  z-index:400;transition:background 0.3s;pointer-events:none;
}
.side-menu-backdrop.active{background:rgba(0,0,0,0.3);pointer-events:auto}
.side-menu-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(252,252,254,0.98);
  backdrop-filter:blur(48px) saturate(180%);-webkit-backdrop-filter:blur(48px) saturate(180%);
  border-top-left-radius:32px;border-top-right-radius:32px;
  border-top:0.5px solid rgba(255,255,255,0.8);
  box-shadow:0 -8px 40px rgba(0,0,0,0.12);
  transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.25,0.9,0.3,1.05);
  padding-bottom:max(env(safe-area-inset-bottom),28px);
  max-height:82vh;overflow-y:auto;scrollbar-width:none;
}
.side-menu-sheet::-webkit-scrollbar{display:none}
.side-menu-backdrop.active .side-menu-sheet{transform:translateY(0)}
.sheet-handle-bar{width:40px;height:4px;background:#c6c6c8;border-radius:4px;margin:14px auto 6px}
.menu-sheet-header{padding:8px 22px 18px;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.menu-sheet-header h3{font-size:22px;font-weight:700;color:#1c1c1e}
.menu-sheet-header p{font-size:13px;color:#8e8e93;margin-top:2px}
.menu-section-title{
  font-size:12px;font-weight:700;color:#8e8e93;
  text-transform:uppercase;letter-spacing:0.6px;padding:18px 22px 8px;
}
.menu-item-row{
  display:flex;align-items:center;gap:16px;padding:14px 22px;
  cursor:pointer;transition:background 0.15s;
}
.menu-item-row:active{background:rgba(0,0,0,0.04)}
.menu-item-icon{
  width:38px;height:38px;border-radius:12px;background:#f2f2f7;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.menu-item-icon i{font-size:17px;color:#1c1c1e}
.menu-item-label{font-size:15px;font-weight:500;color:#1c1c1e}
.menu-section-divider{height:0.5px;background:rgba(0,0,0,0.07);margin:6px 22px}

/* ── PRICE FILTER (top of sheet) ── */
.price-filter-section{
  margin:16px 16px 4px;
  background:#fff;border-radius:22px;
  box-shadow:0 1px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.04);
  overflow:hidden;
}
.price-filter-header{
  display:flex;align-items:center;gap:10px;
  padding:15px 18px 12px;border-bottom:0.5px solid rgba(0,0,0,0.05);
}
.price-filter-header i{font-size:16px;color:#1c1c1e}
.price-filter-header span{font-size:15px;font-weight:600;color:#1c1c1e}
.price-toggle-row{display:flex;padding:12px 16px;gap:8px}
.price-mode-btn{
  flex:1;padding:10px 0;border-radius:14px;border:1.5px solid #e5e5ea;
  background:transparent;font-size:14px;font-weight:600;color:#8e8e93;
  cursor:pointer;transition:all 0.2s;
}
.price-mode-btn.selected{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.price-input-row{display:flex;align-items:center;gap:10px;padding:0 16px 16px}
.price-input-wrap{
  flex:1;display:flex;align-items:center;gap:6px;
  background:#f2f2f7;border-radius:14px;padding:11px 14px;
}
.price-currency{font-size:14px;font-weight:700;color:#8e8e93}
.price-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:16px;font-weight:700;color:#1c1c1e;font-family:inherit;width:0;min-width:0;
}
.price-apply-btn{
  background:#1c1c1e;color:#fff;border:none;border-radius:14px;
  padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;
  transition:transform 0.15s,opacity 0.15s;flex-shrink:0;
}
.price-apply-btn:active{transform:scale(0.96);opacity:0.85}
.price-clear-btn{
  background:transparent;border:none;padding:0 4px;
  font-size:13px;font-weight:600;color:#ff3b30;cursor:pointer;display:none;
}
.price-clear-btn.visible{display:block}

/* ── CART SHEET ── */
.cart-sheet-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,0);z-index:300;
  transition:background 0.25s;pointer-events:none;
}
.cart-sheet-backdrop.show{background:rgba(0,0,0,0.35);pointer-events:auto}
.cart-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(248,248,250,0.98);backdrop-filter:blur(48px);
  border-top-left-radius:28px;border-top-right-radius:28px;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.25,0.9,0.3,1.05);
  max-height:72vh;display:flex;flex-direction:column;
  border-top:0.5px solid rgba(0,0,0,0.06);
}
.cart-sheet-backdrop.show .cart-sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#c6c6c8;border-radius:4px;margin:12px auto 4px}
.cart-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px 14px;border-bottom:0.5px solid rgba(0,0,0,0.06);
}
.cart-header span{font-weight:700;font-size:18px;color:#1c1c1e}
.cart-close-btn{
  width:30px;height:30px;background:#e5e5ea;border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:14px;color:#3c3c43;transition:transform 0.15s;
}
.cart-close-btn:active{transform:scale(0.9)}
.cart-empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:12px}
.cart-empty-state i{font-size:48px;color:#c7c7cc}
.cart-empty-state p{font-size:15px;color:#8e8e93;font-weight:500}
.cart-items-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
.cart-items-list::-webkit-scrollbar{display:none}
.cart-item-row{
  display:flex;align-items:center;gap:12px;
  background:#fff;border-radius:18px;padding:10px 12px;
  box-shadow:0 1px 6px rgba(0,0,0,0.04),0 0 0 0.5px rgba(0,0,0,0.04);
}
.cart-item-img{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:600;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:13px;color:#8e8e93;margin-top:2px}
.cart-qty-wrap{display:flex;align-items:center;gap:6px}
.qty-btn{
  width:28px;height:28px;border-radius:50%;background:#f2f2f7;border:none;
  font-size:16px;font-weight:700;cursor:pointer;color:#1c1c1e;
  display:flex;align-items:center;justify-content:center;transition:transform 0.15s;
}
.qty-btn:active{transform:scale(0.88)}
.qty-num{font-size:14px;font-weight:700;color:#1c1c1e;min-width:20px;text-align:center}
.cart-delete-btn{background:transparent;border:none;cursor:pointer;color:#ff3b30;font-size:15px;padding:6px;transition:transform 0.15s}
.cart-delete-btn:active{transform:scale(0.86)}
.cart-footer{
  padding:14px 16px max(env(safe-area-inset-bottom),20px);
  border-top:0.5px solid rgba(0,0,0,0.06);
}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-label{font-size:15px;color:#8e8e93;font-weight:500}
.cart-total-value{font-size:20px;font-weight:800;color:#1c1c1e;letter-spacing:-0.3px}
.checkout-btn{
  width:100%;background:#1c1c1e;color:white;border:none;border-radius:16px;
  padding:16px;font-weight:700;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform 0.15s,opacity 0.15s;
}
.checkout-btn:active{transform:scale(0.98);opacity:0.9}

/* ── PROFILE ── */
.full-profile-overlay{
  position:absolute;top:0;right:0;bottom:0;width:100%;
  background:#f2f2f7;z-index:600;
  transform:translateX(100%);
  transition:transform 0.32s cubic-bezier(0.25,0.9,0.3,1.05);
  display:flex;flex-direction:column;overflow-y:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.full-profile-overlay::-webkit-scrollbar{display:none}
.full-profile-overlay.active{transform:translateX(0)}
.profile-nav-bar{
  padding-top:max(env(safe-area-inset-top),16px);
  padding-left:12px;padding-right:12px;padding-bottom:12px;
  background:rgba(242,242,247,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,0.05);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
.profile-nav-back{
  display:flex;align-items:center;gap:4px;
  background:transparent;border:none;cursor:pointer;
  padding:6px 8px 6px 2px;border-radius:12px;transition:opacity 0.15s;
}
.profile-nav-back:active{opacity:0.5}
.profile-nav-back svg{width:20px;height:20px;stroke:#007aff;stroke-width:2.2;fill:none;flex-shrink:0}
.profile-nav-back span{font-size:17px;font-weight:400;color:#007aff}
.profile-nav-title{font-size:17px;font-weight:600;color:#1c1c1e;position:absolute;left:50%;transform:translateX(-50%)}
.profile-nav-settings{background:transparent;border:none;cursor:pointer;padding:6px;border-radius:12px;transition:opacity 0.15s}
.profile-nav-settings:active{opacity:0.5}
.profile-nav-settings svg{width:22px;height:22px;stroke:#007aff;stroke-width:2;fill:none;display:block;stroke-linecap:round;stroke-linejoin:round}
.profile-avatar-section{display:flex;flex-direction:column;align-items:center;padding:36px 20px 24px}
.avatar-circle-full{
  width:96px;height:96px;background:#e8f0ff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,122,255,0.15);
}
.avatar-circle-full svg{width:56px;height:56px;stroke:#007aff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.profile-name-full{font-size:22px;font-weight:700;color:#1c1c1e;margin-top:14px}
.profile-email-full{font-size:14px;color:#8e8e93;margin-top:3px}
.profile-stats-full{
  display:flex;justify-content:space-around;
  background:#fff;margin:0 16px 20px;padding:20px;border-radius:22px;
  box-shadow:0 1px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.04);
}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-number{font-size:22px;font-weight:800;color:#1c1c1e;letter-spacing:-0.3px}
.stat-label{font-size:12px;color:#8e8e93;font-weight:500}
.profile-section-card{
  background:#fff;margin:0 16px 16px;border-radius:22px;overflow:hidden;
  box-shadow:0 1px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.04);
}
.profile-menu-item-full{
  display:flex;align-items:center;gap:14px;padding:16px 18px;
  border-bottom:0.5px solid rgba(0,0,0,0.05);cursor:pointer;transition:background 0.15s;
}
.profile-menu-item-full:last-child{border-bottom:none}
.profile-menu-item-full:active{background:#f5f5f5}
.profile-item-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-item-icon i{font-size:16px}
.profile-menu-item-full .item-text{flex:1;font-size:15px;font-weight:500;color:#1c1c1e}
.profile-menu-item-full .chevron{color:#c7c7cc;font-size:13px}
.profile-bottom-pad{height:max(env(safe-area-inset-bottom),32px)}
</style>
</head>
<body>
<div class="app-container">

  <!-- SIDE MENU SHEET -->

    <div class="side-menu-sheet">
      <div class="sheet-handle-bar"></div>
      <div class="menu-sheet-header"><h3>Flow</h3><p>Marketplace</p></div>

      <!-- PRICE FILTER at top -->

</div>
<script>
/* ─── CATEGORY DEFINITIONS with SVG icons ─── */
const CATEGORIES = [

  },

  },
  {
    id:'Food', label:'Food',
    svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v3"/><path d="M12 8v3"/><path d="M17 8v3"/><path d="M7 4h.01"/><path d="M12 4h.01"/><path d="M17 4h.01"/></svg>`
  },
  {
    id:'Sports', label:'Sports',
    svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l4.24 4.24"/><path d="M14.83 9.17l4.24-4.24"/><path d="M14.83 14.83l4.24 4.24"/><path d="M9.17 14.83l-4.24 4.24"/><circle cx="12" cy="12" r="4"/></svg>`
  },
  {
    id:'Books', label:'Books',
    svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`
  },
  {
    id:'Beauty', label:'Beauty',
    svg:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
  },
];

/* ─── PRODUCTS ─── */
const PRODUCTS=[
  {id:1,name:"Aura Headphones",priceDA:17400,category:"Electronics",type:"sellers",likes:284,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop"},
  {id:2,name:"Nova Watch",priceDA:33600,category:"Electronics",type:"sellers",likes:512,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop"},
  {id:3,name:"Orbit Speaker",priceDA:12000,category:"Electronics",type:"sellers",likes:97,img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&h=400&fit=crop"},
  {id:4,name:"Vista Camera",priceDA:67300,category:"Electronics",type:"sellers",likes:341,img:"https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400&h=400&fit=crop"},
  {id:5,name:"Flow Backpack",priceDA:10700,category:"Accessories",type:"seekers",likes:173,img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop"},
  {id:6,name:"Lumina Lamp",priceDA:6100,category:"Home",type:"seekers",likes:68,img:"https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&h=400&fit=crop"},
  {id:7,name:"Nike Air Max",priceDA:21500,category:"Shoes",type:"free",likes:920,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop"},
  {id:8,name:"Leather Jacket",priceDA:26900,category:"Clothing",type:"free",likes:445,img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&h=400&fit=crop"}
];

function fmtDA(n){return n.toLocaleString('fr-DZ')+' DA'}
function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':n}

let cart=[],likedSet=new Set(),likeCounts={};
let searchQuery="",currentSeg="sellers",currentSegIdx=0;
let priceMode="max",priceLimit=null,selectedCategories=new Set();
PRODUCTS.forEach(p=>{likeCounts[p.id]=p.likes});

/* ─── TOAST ─── */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toastMsg');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ─── CART ─── */
function updateCartBadge(){
  const total=cart.reduce((s,i)=>s+i.qty,0);
  const b=document.getElementById('cartBadge');
  if(total>0){b.textContent=total>99?'99+':total;b.style.display='flex';}
  else b.style.display='none';
}
function addToCart(id){
  const ex=cart.find(i=>i.productId===id);
  if(ex)ex.qty++;else cart.push({productId:id,qty:1});
  showToast('Added: '+PRODUCTS.find(p=>p.id===id).name);
  updateCartBadge();renderGrid();
}
function changeQty(id,delta){
  const idx=cart.findIndex(i=>i.productId===id);if(idx===-1)return;
  const nq=cart[idx].qty+delta;
  if(nq<=0)cart.splice(idx,1);else cart[idx].qty=nq;
  updateCartBadge();renderGrid();renderCartBody();
}
function removeFromCart(id){
  cart=cart.filter(i=>i.productId!==id);
  updateCartBadge();renderGrid();renderCartBody();showToast('Removed');
}
function cartTotal(){return cart.reduce((s,i)=>s+(PRODUCTS.find(p=>p.id===i.productId)?.priceDA||0)*i.qty,0)}
function renderCartBody(){
  const body=document.getElementById('cartBody'),footer=document.getElementById('cartFooter');
  body.innerHTML='';
  if(!cart.length){
    footer.style.display='none';
    body.innerHTML='<div class="cart-empty-state"><i class="fas fa-bag-shopping"></i><p>Your bag is empty</p></div>';return;
  }
  footer.style.display='block';
  const list=document.createElement('div');list.className='cart-items-list';
  cart.forEach(item=>{
    const p=PRODUCTS.find(x=>x.id===item.productId);if(!p)return;
    const row=document.createElement('div');row.className='cart-item-row';
    row.innerHTML=`<img class="cart-item-img" src="${p.img}" loading="lazy">
      <div class="cart-item-info"><div class="cart-item-name">${p.name}</div><div class="cart-item-price">${fmtDA(p.priceDA)} × ${item.qty}</div></div>
      <div class="cart-qty-wrap">
        <button class="qty-btn" data-id="${p.id}" data-d="-1">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" data-id="${p.id}" data-d="1">+</button>
      </div>
      <button class="cart-delete-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i></button>`;
    list.appendChild(row);
  });
  body.appendChild(list);
  document.querySelectorAll('.qty-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();changeQty(parseInt(b.dataset.id),parseInt(b.dataset.d))}));
  document.querySelectorAll('.cart-delete-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();removeFromCart(parseInt(b.dataset.id))}));
  document.getElementById('cartTotalPrice').textContent=fmtDA(cartTotal());
}

/* ─── GRID ─── */
function getFiltered(){
  let f=PRODUCTS.filter(p=>p.type===currentSeg);
  if(searchQuery.trim())f=f.filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase()));
  if(selectedCategories.size>0)f=f.filter(p=>selectedCategories.has(p.category));
  if(priceLimit!==null){
    if(priceMode==='max')f=f.filter(p=>p.priceDA<=priceLimit);
    else f=f.filter(p=>p.priceDA>=priceLimit);
  }
  return f;
}
function toggleLike(id){
  if(likedSet.has(id)){likedSet.delete(id);likeCounts[id]--;}
  else{likedSet.add(id);likeCounts[id]++;}
  renderGrid();
}
function renderGrid(){
  const grid=document.getElementById('productsGrid'),filtered=getFiltered();
  if(!filtered.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#8e8e93;font-size:15px">No products found</div>';return;
  }
  grid.innerHTML='';
  filtered.forEach(p=>{
    const liked=likedSet.has(p.id),inCart=cart.some(i=>i.productId===p.id);
    const card=document.createElement('div');card.className='product-card';
    card.innerHTML=`<div class="product-img-wrap">
        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
        <button class="wishlist-btn${liked?' liked':''}" data-id="${p.id}"><i class="${liked?'fas':'far'} fa-heart"></i></button>
        <span class="like-badge"><i class="fas fa-heart" style="font-size:9px;color:#ff6b6b"></i> ${fmt(likeCounts[p.id])}</span>
      </div>
      <div class="product-info-card">
        <div class="product-price">${fmtDA(p.priceDA)}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-category">${p.category}</div>
        <button class="add-cart-btn${inCart?' in-cart':''}" data-id="${p.id}">
          ${inCart?'<i class="fas fa-check"></i> In Cart':'<i class="fas fa-plus"></i> Add'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
  document.querySelectorAll('.wishlist-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();toggleLike(parseInt(b.dataset.id))}));
  document.querySelectorAll('.add-cart-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();addToCart(parseInt(b.dataset.id))}));
}

/* ─── SEGMENTED (draggable) ─── */
function initSegments(){
  const segs=[...document.querySelectorAll('.segment')];
  const ind=document.getElementById('slidingIndicator');
  const wrapper=document.getElementById('segmentedWrapper');
  const N=segs.length;
  function segW(){return wrapper.clientWidth/N}
  function posForIdx(idx){return idx*segW()+3}
  function applyPos(x,snap){
    ind.classList.toggle('snap',!!snap);
    ind.style.width=(segW()-6)+'px';
    ind.style.transform=`translateX(${x}px)`;
  }
  function activateIdx(idx){
    currentSegIdx=idx;currentSeg=segs[idx].dataset.filter;
    segs.forEach((s,i)=>s.classList.toggle('active',i===idx));
    renderGrid();
  }
  function snapTo(x){
    const idx=Math.max(0,Math.min(N-1,Math.round((x-3)/segW())));
    applyPos(posForIdx(idx),true);activateIdx(idx);
  }
  requestAnimationFrame(()=>applyPos(posForIdx(0),false));
  window.addEventListener('resize',()=>applyPos(posForIdx(currentSegIdx),false));
  segs.forEach((s,i)=>s.addEventListener('click',()=>{applyPos(posForIdx(i),true);activateIdx(i)}));
  let dragging=false,startX=0,startPos=0;
  function dragStart(cx){
    dragging=true;startX=cx;
    const m=new DOMMatrix(getComputedStyle(ind).transform);
    startPos=m.m41||posForIdx(currentSegIdx);
    ind.classList.remove('snap');
  }
  function dragMove(cx){
    if(!dragging)return;
    const newX=Math.max(posForIdx(0),Math.min(posForIdx(N-1),startPos+(cx-startX)));
    applyPos(newX,false);
    const nearIdx=Math.max(0,Math.min(N-1,Math.round((newX-3)/segW())));
    segs.forEach((s,i)=>s.classList.toggle('active',i===nearIdx));
  }
  function dragEnd(cx){
    if(!dragging)return;dragging=false;
    snapTo(startPos+(cx-startX));
  }
  wrapper.addEventListener('touchstart',e=>dragStart(e.touches[0].clientX),{passive:true});
  wrapper.addEventListener('touchmove',e=>dragMove(e.touches[0].clientX),{passive:true});
  wrapper.addEventListener('touchend',e=>dragEnd(e.changedTouches[0].clientX));
  wrapper.addEventListener('mousedown',e=>dragStart(e.clientX));
  window.addEventListener('mousemove',e=>{if(dragging)dragMove(e.clientX)});
  window.addEventListener('mouseup',e=>{if(dragging)dragEnd(e.clientX)});
}

/* ─── CATEGORY FILTER — full-width slim panel, multi-select ─── */
function initCatFilter(){
  const btn=document.getElementById('filterBtn');
  const backdrop=document.getElementById('catFilterBackdrop');
  const panel=document.getElementById('catFilterPanel');
  const scroll=document.getElementById('catChipsScroll');
  const dot=document.getElementById('filterDot');
  const clearBtn=document.getElementById('catFilterClear');

  // Position panel just below top bar
  function positionPanel(){
    const topBar=document.querySelector('.glass-top-bar');
    const top=topBar.offsetTop+topBar.offsetHeight+8;
    panel.style.top=top+'px';
  }

  // Build chips (skip 'all' chip — multi-select doesn't need it)
  CATEGORIES.filter(c=>c.id!=='all').forEach(cat=>{
    const chip=document.createElement('div');
    chip.className='cat-chip';
    chip.dataset.cat=cat.id;
    chip.innerHTML=cat.svg+`<span class="cat-chip-label">${cat.label}</span>`;
    chip.addEventListener('click',e=>{
      e.stopPropagation();
      if(selectedCategories.has(cat.id)){
        selectedCategories.delete(cat.id);
        chip.classList.remove('selected');
      } else {
        selectedCategories.add(cat.id);
        chip.classList.add('selected');
      }
      const hasAny=selectedCategories.size>0;
      dot.classList.toggle('visible',hasAny);
      btn.classList.toggle('active-filter',hasAny);
      clearBtn.classList.toggle('visible',hasAny);
      renderGrid();
    });
    scroll.appendChild(chip);
  });

  // Clear all
  clearBtn.addEventListener('click',e=>{
    e.stopPropagation();
    selectedCategories.clear();
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('selected'));
    dot.classList.remove('visible');
    btn.classList.remove('active-filter');
    clearBtn.classList.remove('visible');
    renderGrid();
  });

  // Toggle
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    positionPanel();
    backdrop.classList.toggle('open');
  });
  backdrop.addEventListener('click',e=>{
    if(e.target===backdrop)backdrop.classList.remove('open');
  });
  document.addEventListener('click',e=>{
    if(!btn.contains(e.target)&&!backdrop.contains(e.target)){
      backdrop.classList.remove('open');
    }
  });
}

/* ─── SIDE MENU (bottom sheet) ─── */
function initSideMenu(){
  const backdrop=document.getElementById('sideMenuBackdrop');
  document.getElementById('menuSideBtn').addEventListener('click',()=>backdrop.classList.add('active'));
  backdrop.addEventListener('click',e=>{if(e.target===backdrop)backdrop.classList.remove('active')});
  document.querySelectorAll('.menu-item-row').forEach(item=>{
    item.addEventListener('click',()=>{
      backdrop.classList.remove('active');
      const labels={'add-product':'Add Product','create-niche':'Create Niche','verify-orders':'Verify Orders','view-purchases':'View Purchases','manage-niches':'Manage Niches'};
      showToast(labels[item.dataset.action]+' (coming soon)');
    });
  });
}

/* ─── PRICE FILTER ─── */
function initPriceFilter(){
  const modeBtns=document.querySelectorAll('.price-mode-btn');
  const input=document.getElementById('priceInput');
  const applyBtn=document.getElementById('priceApplyBtn');
  const clearBtn=document.getElementById('priceClearBtn');
  modeBtns.forEach(b=>{
    b.addEventListener('click',()=>{
      modeBtns.forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');priceMode=b.dataset.mode;
    });
  });
  applyBtn.addEventListener('click',()=>{
    const val=parseFloat(input.value);
    if(isNaN(val)||val<0){showToast('Enter a valid price');return;}
    priceLimit=val;renderGrid();
    clearBtn.classList.add('visible');
    document.getElementById('sideMenuBackdrop').classList.remove('active');
    showToast('Price filter applied');
  });
  clearBtn.addEventListener('click',()=>{
    priceLimit=null;input.value='';
    clearBtn.classList.remove('visible');
    renderGrid();
  });
}

/* ─── CART SHEET ─── */
function initCartSheet(){
  const back=document.getElementById('cartSheetBackdrop');
  document.getElementById('bagIconBtn').addEventListener('click',()=>{renderCartBody();back.classList.add('show')});
  document.getElementById('closeCartSheet').addEventListener('click',()=>back.classList.remove('show'));
  back.addEventListener('click',e=>{if(e.target===back)back.classList.remove('show')});
  document.getElementById('checkoutBtn').addEventListener('click',()=>{
    if(!cart.length){showToast('Bag is empty');return;}
    showToast('Order placed! Pay on delivery 🎉');
    cart=[];updateCartBadge();renderGrid();renderCartBody();back.classList.remove('show');
  });
}

/* ─── PROFILE ─── */
function initProfile(){
  const overlay=document.getElementById('fullProfileOverlay');
  document.getElementById('profileFullBtn').addEventListener('click',()=>overlay.classList.add('active'));
  document.getElementById('closeProfileFullBtn').addEventListener('click',()=>overlay.classList.remove('active'));
  document.getElementById('profileSettingsBtn').addEventListener('click',()=>showToast('Settings (coming soon)'));
  document.querySelectorAll('.profile-menu-item-full').forEach(item=>{
    item.addEventListener('click',()=>{overlay.classList.remove('active');showToast(item.querySelector('.item-text').textContent+' (coming soon)')});
  });
}

/* ─── SEARCH ─── */
function initSearch(){
  document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderGrid()});
}

/* ─── BOOT ─── */
renderGrid();
initSegments();
initCatFilter();
initSideMenu();
initPriceFilter();
initCartSheet();
initProfile();
initSearch();
updateCartBadge();
</script>
