<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Boutique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif;
        }

        :root {
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #c7c7cc;
            --bg: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
        }

        .app-container {
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* ===== GLASS BUTTONS ===== */
        .glass-btn {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .glass-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.4);
        }

        /* ===== HEADER ===== */
        .header {
            position: absolute;
            top: env(safe-area-inset-top, 0);
            left: 0;
            right: 0;
            padding: 8px 16px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .header > * {
            pointer-events: auto;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
        }

        .top-actions {
            display: flex;
            gap: 8px;
            position: relative;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            position: relative;
        }

        .action-btn .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 18px;
            height: 18px;
            background: #ff375f;
            border-radius: 50%;
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        /* ===== PLUS DROPDOWN ===== */
        .plus-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 8px;
            min-width: 200px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 150;
        }

        .plus-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .plus-dropdown::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 14px;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.5);
            transform: rotate(45deg);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
        }

        .dropdown-item:hover,
        .dropdown-item:active {
            background: rgba(0,0,0,0.04);
        }

        .dropdown-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ===== PRODUCTS ===== */
        .products-container {
            padding: 60px 14px 130px;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .products-container::-webkit-scrollbar {
            display: none;
        }

        .section-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.8px;
        }

        .section-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 400;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 20px;
        }

        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .product-card:nth-child(odd) {
            transform: translateY(-16px);
        }

        .product-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-4px);
        }

        .product-card:nth-child(odd):hover {
            transform: translateY(-20px);
        }

        .product-card:active {
            transform: scale(0.97);
            transition-duration: 0.1s;
        }

        .product-card:nth-child(odd):active {
            transform: scale(0.97) translateY(-16px);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: #e8e8ed;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .time-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
            letter-spacing: 0.2px;
        }

        .time-badge svg {
            width: 12px;
            height: 12px;
            opacity: 0.7;
        }

        .product-fav {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.45);
            color: var(--text-secondary);
            transition: all 0.2s;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }

        .product-fav:active {
            transform: scale(0.9);
        }

        .product-fav.active {
            color: #ff375f;
            background: rgba(255, 55, 95, 0.15);
        }

        .product-info {
            padding: 14px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.3;
            letter-spacing: -0.2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .product-price .original {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-decoration: line-through;
            margin-left: 6px;
        }

        /* ===== BOTTOM BAR ===== */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 16px 34px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .bottom-bar > * {
            pointer-events: auto;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-bar {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            padding: 0 20px 0 48px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .search-bar::placeholder {
            color: var(--text-secondary);
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.45);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .boutique-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .boutique-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.45);
        }

        /* ===== SEARCH PAGE ===== */
        .search-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            z-index: 250;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-overlay.active {
            transform: translateY(0);
        }

        .search-page-header {
            padding: env(safe-area-inset-top, 0) 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: var(--bg);
        }

        .search-page-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-page-input {
            width: 100%;
            height: 44px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 22px;
            padding: 0 16px 0 40px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .search-page-input::placeholder {
            color: var(--text-secondary);
        }

        .search-page-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-page-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.06);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .search-page-close:active {
            transform: scale(0.9);
            background: rgba(0,0,0,0.1);
        }

        .search-page-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .search-page-content::-webkit-scrollbar {
            display: none;
        }

        .search-section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 12px;
        }

        .search-tag {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin: 0 6px 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-tag:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.9);
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-result-item:active {
            transform: scale(0.98);
        }

        .search-result-img {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            object-fit: cover;
            background: #e8e8ed;
            flex-shrink: 0;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .search-result-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ===== CART SHEET ===== */
        .sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 85%;
            background: var(--bg);
            border-radius: 32px 32px 0 0;
            z-index: 201;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
        }

        .sheet.active {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: var(--text-tertiary);
            border-radius: 2px;
            margin: 12px auto;
            flex-shrink: 0;
        }

        .sheet-header {
            padding: 8px 24px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sheet-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.06);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .sheet-close:active {
            transform: scale(0.9);
            background: rgba(0,0,0,0.1);
        }

        .sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .sheet-content::-webkit-scrollbar {
            display: none;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
            position: relative;
        }

        .cart-item:active {
            transform: scale(0.98);
        }

        .cart-item-img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: cover;
            background: #e8e8ed;
            flex-shrink: 0;
        }

        .cart-item-info {
            flex: 1;
            min-width: 0;
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-item-variant {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 18px;
            padding: 3px;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .qty-btn:active {
            background: rgba(0,0,0,0.12);
            transform: scale(0.9);
        }

        .qty-value {
            font-size: 13px;
            font-weight: 600;
            min-width: 18px;
            text-align: center;
        }

        .cart-item-delete {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 55, 95, 0.1);
            color: #ff375f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .cart-item-delete:active {
            transform: scale(0.9);
            background: rgba(255, 55, 95, 0.2);
        }

        .cart-footer {
            padding: 16px 24px 24px;
            border-top: 1px solid rgba(0,0,0,0.06);
            background: var(--bg);
            flex-shrink: 0;
        }

        .cart-summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .cart-summary.total {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .checkout-btn {
            width: 100%;
            height: 52px;
            background: var(--text-primary);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-top: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-md);
            letter-spacing: -0.2px;
        }

        .checkout-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ===== TOAST ===== */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(29, 29, 31, 0.92);
            backdrop-filter: blur(20px);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 260px;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.2s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.3s; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <button class="glass-btn menu-btn" onclick="showToast('Menu')">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 5H3"/>
                    <path d="M15 12H3"/>
                    <path d="M17 19H3"/>
                </svg>
            </button>

            <div class="top-actions">
                <button class="glass-btn action-btn" id="plusBtn" onclick="togglePlusDropdown(event)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a10 10 0 0 1 7.38 16.75"/>
                        <path d="M12 8v8"/>
                        <path d="M16 12H8"/>
                        <path d="M2.5 8.875a10 10 0 0 0-.5 3"/>
                        <path d="M2.83 16a10 10 0 0 0 2.43 3.4"/>
                        <path d="M4.636 5.235a10 10 0 0 1 .891-.857"/>
                        <path d="M8.644 21.42a10 10 0 0 0 7.631-.38"/>
                    </svg>
                </button>

                <!-- Plus Dropdown -->
                <div class="plus-dropdown" id="plusDropdown">
                    <div class="dropdown-item" onclick="showToast('Add Product'); togglePlusDropdown(event)">
                        <div class="dropdown-item-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14"/>
                                <path d="M12 5v14"/>
                            </svg>
                        </div>
                        Add Product
                    </div>
                    <div class="dropdown-item" onclick="showToast('Create Niche'); togglePlusDropdown(event)">
                        <div class="dropdown-item-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/>
                            </svg>
                        </div>
                        Create Niche
                    </div>
                    <div class="dropdown-item" onclick="showToast('Add Order'); togglePlusDropdown(event)">
                        <div class="dropdown-item-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
                                <path d="M3 6h18"/>
                                <path d="M16 10a4 4 0 0 1-8 0"/>
                            </svg>
                        </div>
                        Add Order
                    </div>
                </div>

                <button class="glass-btn action-btn" onclick="openCart()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                        <path d="M3.103 6.034h17.794"/>
                        <path d="M3.4 5.467a2 2 0 0 0-.4 1.2V20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6.667a2 2 0 0 0-.4-1.2l-2-2.667A2 2 0 0 0 17 2H7a2 2 0 0 0-1.6.8z"/>
                    </svg>
                    <span class="badge" id="cartBadge">2</span>
                </button>
            </div>
        </div>

        <!-- Products -->
        <div class="products-container" id="productsContainer">
            <h1 class="section-title">Discover</h1>
            <p class="section-subtitle">Curated collection for you</p>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" class="search-bar" placeholder="Search products..." id="searchInput" onclick="openSearchPage()" readonly>
            </div>
            <button class="boutique-btn" onclick="showToast('Boutique Home')">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5"/>
                    <path d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244"/>
                    <path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05"/>
                </svg>
            </button>
        </div>

        <!-- Search Page -->
        <div class="search-overlay" id="searchOverlay">
            <div class="search-page-header">
                <div class="search-page-input-wrapper">
                    <svg class="search-page-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.3-4.3"/>
                    </svg>
                    <input type="text" class="search-page-input" placeholder="Search products..." id="searchPageInput" autocomplete="off">
                </div>
                <button class="search-page-close" onclick="closeSearchPage()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"/>
                        <path d="m6 6 12 12"/>
                    </svg>
                </button>
            </div>
            <div class="search-page-content" id="searchPageContent">
                <div class="search-section-title">Recent Searches</div>
                <div>
                    <span class="search-tag" onclick="fillSearch('Sneakers')">Sneakers</span>
                    <span class="search-tag" onclick="fillSearch('Watch')">Watch</span>
                    <span class="search-tag" onclick="fillSearch('Bag')">Bag</span>
                    <span class="search-tag" onclick="fillSearch('Headphones')">Headphones</span>
                </div>
                <div class="search-section-title">Popular</div>
                <div id="searchResults"></div>
            </div>
        </div>

        <!-- Cart Sheet -->
        <div class="sheet-overlay" id="cartOverlay" onclick="closeCart()"></div>
        <div class="sheet" id="cartSheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <h2 class="sheet-title">Shopping Cart</h2>
                <button class="sheet-close" onclick="closeCart()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"/>
                        <path d="m6 6 12 12"/>
                    </svg>
                </button>
            </div>
            <div class="sheet-content" id="cartItems"></div>
            <div class="cart-footer">
                <div class="cart-summary">
                    <span>Subtotal</span>
                    <span id="subtotal">$218.00</span>
                </div>
                <div class="cart-summary">
                    <span>Shipping</span>
                    <span style="color: #34c759;">Free</span>
                </div>
                <div class="cart-summary total">
                    <span>Total</span>
                    <span id="total">$218.00</span>
                </div>
                <button class="checkout-btn" onclick="showToast('Proceeding to checkout...')">Checkout</button>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        const products = [
            { name: "Minimal White Sneakers", price: 129, originalPrice: 159, image: "https://kimi-web-img.moonshot.cn/img/static.wixstatic.com/5e8ec06492f1c2f67eb023b6604cfb5f7050c62a.jpg", timeAgo: "2 hours ago" },
            { name: "Premium Leather Tote", price: 189, originalPrice: null, image: "https://kimi-web-img.moonshot.cn/img/img.freepik.com/8d7dc161e13c55b20f36b5613ee07cb5767ed9a5.jpg", timeAgo: "5 hours ago" },
            { name: "Designer Sunglasses", price: 89, originalPrice: 120, image: "https://kimi-web-img.moonshot.cn/img/thumbs.dreamstime.com/540422c74c369b17beab1177e7af211cd6aae14c.jpg", timeAgo: "1 day ago" },
            { name: "Smart Watch Pro", price: 299, originalPrice: null, image: "https://kimi-web-img.moonshot.cn/img/m.media-amazon.com/446d206c09007c786150726cb533c3da333a9921.jpg", timeAgo: "30 minutes ago" },
            { name: "Denim Trucker Jacket", price: 149, originalPrice: null, image: "https://kimi-web-img.moonshot.cn/img/thursdayboots.com/bd811b7f7696dd0d63edc210d8566f86b362506a.jpg", timeAgo: "3 hours ago" },
            { name: "Wireless Headphones", price: 199, originalPrice: 249, image: "https://kimi-web-img.moonshot.cn/img/silentsoundsystem.com/7570e48042d4a88a7ed2f37cde48af10fd657e16.jpg", timeAgo: "15 minutes ago" }
        ];

        let cartData = [
            { name: "Minimal White Sneakers", price: 129, qty: 1, image: products[0].image, variant: "Size 42 / White" },
            { name: "Premium Leather Tote", price: 189, qty: 1, image: products[1].image, variant: "Brown / Large" }
        ];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="showToast('${p.name}')">
                    <div class="product-image-wrapper">
                        <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                        <div class="time-badge">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                            ${p.timeAgo}
                        </div>
                        <button class="product-fav" onclick="event.stopPropagation(); toggleFav(this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">
                            $${p.price}
                            ${p.originalPrice ? `<span class="original">$${p.originalPrice}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cartData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>
                        </svg>
                        <h3>Your cart is empty</h3>
                        <p>Add some products to get started</p>
                    </div>`;
                updateTotals();
                updateBadge();
                return;
            }
            container.innerHTML = cartData.map((item, i) => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-variant">${item.variant}</div>
                        <div class="cart-item-price">$${item.price}.00</div>
                    </div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="updateQty(${i}, -1)">−</button>
                        <span class="qty-value">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${i}, 1)">+</button>
                    </div>
                    <button class="cart-item-delete" onclick="deleteCartItem(${i})">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                        </svg>
                    </button>
                </div>
            `).join('');
            updateTotals();
        }

        function updateQty(i, d) { cartData[i].qty = Math.max(1, cartData[i].qty + d); renderCart(); updateBadge(); }
        function deleteCartItem(i) { cartData.splice(i, 1); renderCart(); updateBadge(); showToast('Item removed'); }
        function updateTotals() { const s = cartData.reduce((a, b) => a + b.price * b.qty, 0); document.getElementById('subtotal').textContent = `$${s.toFixed(2)}`; document.getElementById('total').textContent = `$${s.toFixed(2)}`; }
        function updateBadge() { const t = cartData.reduce((a, b) => a + b.qty, 0); const b = document.getElementById('cartBadge'); b.textContent = t; b.style.display = t > 0 ? 'flex' : 'none'; }

        function openCart() { document.getElementById('cartOverlay').classList.add('active'); document.getElementById('cartSheet').classList.add('active'); renderCart(); }
        function closeCart() { document.getElementById('cartOverlay').classList.remove('active'); document.getElementById('cartSheet').classList.remove('active'); }

        function togglePlusDropdown(e) { e.stopPropagation(); document.getElementById('plusDropdown').classList.toggle('active'); }
        document.addEventListener('click', function(e) { const d = document.getElementById('plusDropdown'); const b = document.getElementById('plusBtn'); if (!d.contains(e.target) && e.target !== b && !b.contains(e.target)) d.classList.remove('active'); });

        function toggleFav(btn) { btn.classList.toggle('active'); showToast(btn.classList.contains('active') ? 'Added to favorites' : 'Removed from favorites'); }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

        // Search Page
        function openSearchPage() {
            document.getElementById('searchOverlay').classList.add('active');
            setTimeout(() => document.getElementById('searchPageInput').focus(), 300);
        }

        function closeSearchPage() {
            document.getElementById('searchOverlay').classList.remove('active');
            document.getElementById('searchPageInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        }

        function fillSearch(term) {
            document.getElementById('searchPageInput').value = term;
            doSearch(term);
        }

        function doSearch(term) {
            const results = products.filter(p => p.name.toLowerCase().includes(term.toLowerCase()));
            const container = document.getElementById('searchResults');
            if (results.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-secondary);">No results found</div>';
                return;
            }
            container.innerHTML = results.map(p => `
                <div class="search-result-item" onclick="showToast('${p.name}'); closeSearchPage();">
                    <img src="${p.image}" alt="${p.name}" class="search-result-img">
                    <div class="search-result-info">
                        <div class="search-result-name">${p.name}</div>
                        <div class="search-result-price">$${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchPageInput').addEventListener('input', function(e) {
            const term = e.target.value.trim();
            if (term.length > 0) doSearch(term);
            else document.getElementById('searchResults').innerHTML = '';
        });

        // Pull to close cart
        const cs = document.getElementById('cartSheet');
        let cty = 0;
        cs.addEventListener('touchstart', e => { if (cs.scrollTop === 0) cty = e.touches[0].clientY; }, { passive: true });
        cs.addEventListener('touchmove', e => { if (cs.scrollTop === 0 && e.touches[0].clientY - cty > 80) closeCart(); }, { passive: true });

        renderProducts();
        renderCart();

        document.querySelector('.app-container').addEventListener('touchmove', function(e) {
            if (e.target.closest('.products-container') || e.target.closest('.sheet-content') || e.target.closest('.search-page-content')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
